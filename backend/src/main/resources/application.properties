spring.application.name=ai-api-builder-backend
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:backend/.env[.properties],optional:file:../backend/.env[.properties]
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:h2:mem:aibuilder;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.ai.provider=${AI_PROVIDER:gemini}
app.gemini.api-key=${GEMINI_API_KEY:${GOOGLE_API_KEY:replace-me}}
app.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
app.gemini.temperature=${GEMINI_TEMPERATURE:0.2}
app.jwt.secret=${JWT_SECRET:change-this-jwt-secret-key-to-at-least-32-characters}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
