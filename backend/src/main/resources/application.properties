spring.application.name=ai-api-builder-backend
server.port=8080

spring.datasource.url=jdbc:h2:mem:aibuilder;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.ai.provider=${AI_PROVIDER:mock}
app.openai.api-key=${OPENAI_API_KEY:replace-me}
app.openai.model=${OPENAI_MODEL:gpt-4.1}
app.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.openai.temperature=${OPENAI_TEMPERATURE:0.2}
app.jwt.secret=${JWT_SECRET:change-this-jwt-secret-key-to-at-least-32-characters}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
